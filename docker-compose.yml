services:
  frontend:
    build: .
    image: buyyakhoo/leaverequestsystem-frontend:latest
    ports:
      - "4173:4173"
    environment:
      - NODE_ENV=${NODE_ENV}
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - API_BASE=${API_BASE}
      - PORT=${PORT}
      - ORIGIN=${ORIGIN}
      - PROTOCOL_HEADER=x-forwarded-proto
      - HOST_HEADER=x-forwarded-host
    networks:
      - appnet

networks:
  appnet:
    external: true